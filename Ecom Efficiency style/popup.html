<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pipiads Quick Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; width: 250px; }
    h1 { font-size: 18px; margin-bottom: 10px; }
    button { width: 100%; padding: 10px; margin: 5px 0; font-size: 15px; cursor: pointer; background:#5b39a7; color:#fff; border:none; border-radius:4px; }
  </style>
</head>
<body>
  <div id="ee-hf-credits" style="display:none; margin-bottom:12px; padding:10px; background:#1a1a2e; border-radius:8px; font-size:13px;">
    <div style="font-weight:700; margin-bottom:4px;">Higgsfield</div>
    <div>Remaining: <strong id="ee-hf-credits-value">–</strong></div>
    <div>Used today: <strong id="ee-hf-used-value">0</strong></div>
    <div id="ee-hf-limit-msg" style="display:none; color:#ff6b6b; font-weight:700; margin-top:6px;"></div>
  </div>
  <h1>Pipiads — Choisir un compte</h1>
  <button data-target="account1">Pipiads 1</button>
  <button data-target="account2">Pipiads 2</button>
  <button data-target="account3">Pipiads 3</button>

  <script src="popup.js"></script>
</body>
</html>
