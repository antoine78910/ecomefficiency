<script>
(function() {
    // Configuration: refill tous les 3 jours (72 heures)
    const REFILL_INTERVAL_HOURS = 72;
    
    // Date de référence: DERNIER refill effectué (pas le prochain)
    // Changez cette date pour votre dernier refill effectué
    const LAST_REFILL_DATE = new Date('2025-01-29T00:00:00Z'); // ← Date de votre DERNIER refill
    
    function updateCountdown() {
        const now = new Date();
        const timeSinceLastRefill = now.getTime() - LAST_REFILL_DATE.getTime();
        const hoursSinceLastRefill = timeSinceLastRefill / (1000 * 60 * 60);
        
        // Calculer combien d'heures se sont écoulées dans le cycle actuel
        const hoursInCurrentCycle = hoursSinceLastRefill % REFILL_INTERVAL_HOURS;
        
        // Calculer les heures restantes jusqu'au prochain refill
        const hoursUntilNextRefill = REFILL_INTERVAL_HOURS - hoursInCurrentCycle;
        
        // S'assurer que ça ne dépasse jamais 72 heures
        const hoursRemaining = Math.max(1, Math.min(72, Math.ceil(hoursUntilNextRefill)));
        
        // Calculer le pourcentage de progression (0% = just refilled, 100% = about to refill)
        const progressPercentage = Math.min(100, (hoursInCurrentCycle / REFILL_INTERVAL_HOURS) * 100);
        
        // Mettre à jour le countdown
        const countdownElement = document.getElementById('elevenlabs-countdown');
        if (countdownElement) {
            if (hoursRemaining <= 1) {
                countdownElement.textContent = 'less than 1';
            } else {
                countdownElement.textContent = hoursRemaining.toString();
            }
        }
        
        // Mettre à jour la barre de progression
        const progressBar = document.getElementById('elevenlabs-progress');
        if (progressBar) {
            progressBar.style.width = progressPercentage + '%';
        }
        
        // Mettre à jour le texte de progression
        const progressText = document.getElementById('elevenlabs-progress-text');
        if (progressText) {
            if (hoursRemaining <= 1) {
                progressText.textContent = 'Refilling soon...';
            } else if (hoursRemaining <= 24) {
                progressText.textContent = `Day 3 - ${hoursRemaining}h remaining`;
            } else if (hoursRemaining <= 48) {
                progressText.textContent = `Day 2 - ${hoursRemaining}h remaining`;
            } else {
                progressText.textContent = `Day 1 - ${hoursRemaining}h remaining`;
            }
        }
        
        // Debug info (à supprimer en production)
        console.log('DEBUG ElevenLabs:', {
            now: now.toISOString(),
            lastRefill: LAST_REFILL_DATE.toISOString(),
            hoursSinceLastRefill: Math.round(hoursSinceLastRefill * 100) / 100,
            hoursInCurrentCycle: Math.round(hoursInCurrentCycle * 100) / 100,
            hoursRemaining: hoursRemaining,
            progressPercentage: Math.round(progressPercentage)
        });
    }
    
    // Mettre à jour immédiatement
    updateCountdown();
    
    // Mettre à jour toutes les heures
    setInterval(updateCountdown, 60 * 60 * 1000);
    
    // Optionnel : mettre à jour plus fréquemment pour plus de précision (toutes les 10 minutes)
    // setInterval(updateCountdown, 10 * 60 * 1000);
})();
</script>
