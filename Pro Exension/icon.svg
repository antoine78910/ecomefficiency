<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b45c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b35a4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Main "E" -->
  <text x="64" y="85" font-family="Arial, sans-serif" font-size="72" font-weight="900" 
        text-anchor="middle" fill="url(#logoGradient)" stroke="#8b45c4" stroke-width="1">E</text>
  
  <!-- Small "E" -->
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="24" font-weight="700" 
        text-anchor="middle" fill="url(#logoGradient)" opacity="0.8">E</text>
  
  <!-- Decorative elements -->
  <circle cx="32" cy="32" r="4" fill="#8b45c4" opacity="0.6"/>
  <circle cx="96" cy="32" r="4" fill="#8b45c4" opacity="0.6"/>
  <circle cx="32" cy="96" r="4" fill="#8b45c4" opacity="0.6"/>
  <circle cx="96" cy="96" r="4" fill="#8b45c4" opacity="0.6"/>
</svg>
