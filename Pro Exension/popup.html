<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Efficiency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            color: #8b45c4;
            font-size: 1.5em;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(139, 69, 196, 0.3);
        }

        .version {
            color: #888;
            font-size: 0.8em;
        }

        .content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            color: #4CAF50;
        }

        .info-item {
            margin: 10px 0;
            font-size: 0.9em;
            color: #ccc;
        }

        .info-label {
            color: #8b45c4;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            font-size: 0.75em;
            color: #666;
            margin-top: 15px;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b45c4 0%, #6b35a4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 196, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ECOM EFFICIENCY</div>
        <div class="version">v1.0.1</div>
    </div>

    <div class="content">
        <div class="status">
            <div class="status-indicator"></div>
            <div class="status-text">Extension Active</div>
        </div>
        
        <div class="info-item">
            <span class="info-label">Site supporté :</span>
            <br>Pipiads.com
        </div>
        
        <div class="info-item">
            <span class="info-label">Fonctionnalité :</span>
            <br>Connexion automatique
        </div>
    </div>

    <button class="button" id="testBtn">Tester la connexion</button>

    <div class="footer">
        © 2025 Ecom Efficiency
    </div>

    <script src="popup.js"></script>
</body>
</html>
