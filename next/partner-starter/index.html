<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My SaaS</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      .card {
        max-width: 32rem;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        text-align: center;
      }
      a.btn {
        display: inline-block;
        margin: 0.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        background: #9541e0;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      a.ghost {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      #pricing {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: #a3a3a3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">My SaaS</h1>
      <p id="tagline">Your custom landing — auth runs on app.yourdomain.com</p>
      <div>
        <a id="cta-signup" class="btn" href="#">Get started</a>
        <a id="cta-signin" class="btn ghost" href="#">Sign in</a>
      </div>
      <p id="pricing"></p>
    </div>
    <script>
      const PARTNER_SLUG = "your-slug";
      const APP_ORIGIN = "https://app.yourdomain.com";

      document.getElementById("cta-signup").href = APP_ORIGIN + "/signup";
      document.getElementById("cta-signin").href = APP_ORIGIN + "/signin";

      fetch(APP_ORIGIN + "/api/partners/config?slug=" + encodeURIComponent(PARTNER_SLUG))
        .then((r) => r.json())
        .then((j) => {
          const c = j && j.config ? j.config : {};
          if (c.saasName) document.getElementById("title").textContent = c.saasName;
          if (c.tagline) document.getElementById("tagline").textContent = c.tagline;
          if (c.monthlyPrice) {
            document.getElementById("pricing").textContent =
              "From " + c.monthlyPrice + " " + (c.currency || "EUR") + " / month";
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
