<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ecom Efficiency — Extension required</title>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #050208; font-family: system-ui, -apple-system, sans-serif; }
    #guard {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      text-align: center; max-width: 420px; padding: 2.5rem 2rem;
      border: 1px solid rgba(239, 68, 68, 0.35); border-radius: 1.25rem;
      background: #0e0a18; box-shadow: 0 0 60px rgba(239, 68, 68, 0.12);
    }
    .label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #a78bfa; margin-bottom: 0.5rem; }
    h1 { font-size: 1.35rem; font-weight: 700; color: #f87171; margin: 0 0 0.75rem; }
    p { color: #9ca3af; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.25rem; }
    .bar { height: 6px; background: rgba(239, 68, 68, 0.15); border-radius: 999px; overflow: hidden; margin-bottom: 0.5rem; }
    .bar-fill { height: 100%; background: #f87171; border-radius: 999px; transition: width 1s linear; width: 0; }
    button {
      width: 100%; padding: 0.65rem; border-radius: 0.75rem;
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5; font-size: 0.875rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="guard" role="alert">
    <div class="card">
      <p class="label">Ecom Efficiency</p>
      <div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div>
      <h1>Extension not found</h1>
      <p id="msg">Checking extension…</p>
      <div class="bar" id="bar" style="display:none"><div class="bar-fill" id="barFill"></div></div>
      <button type="button" id="retry" style="display:none">Re-check extension</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var ADSPOWER_API_KEY = __ADSPOWER_API_KEY_JSON__;
  var ADSPOWER_PROFILE_ID = __ADSPOWER_PROFILE_ID_JSON__;
  var REDIRECT_URL = __GUARD_REDIRECT_URL_JSON__;
  var DELAY_MS = __GUARD_DELAY_MS_JSON__;
  var ENDPOINTS = __ADSPOWER_ENDPOINTS_JSON__;
  var SESSION_ID = __SESSION_ID_JSON__;
  var SESSION_API_BASE = __SESSION_API_BASE_JSON__;
  var CENTRAL_VPS = __CENTRAL_VPS_JSON__;

  function postSessionHeartbeat() {
    if (!SESSION_ID || !SESSION_API_BASE) return;
    try {
      fetch(SESSION_API_BASE.replace(/\/$/, '') + '/api/sessions/heartbeat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: SESSION_ID }),
        keepalive: true
      }).catch(function () {});
    } catch (e) {}
  }

  var msg = document.getElementById('msg');
  var bar = document.getElementById('bar');
  var barFill = document.getElementById('barFill');
  var retry = document.getElementById('retry');
  var cancelled = false;

  function apiBase() {
    try {
      if (typeof location !== 'undefined' && location.origin && location.origin !== 'null') {
        return location.origin.replace(/\/$/, '');
      }
    } catch (e) {}
    return (SESSION_API_BASE || '').replace(/\/$/, '');
  }

  function guardEvent(event, extra) {
    var base = apiBase();
    if (!base) return;
    try {
      fetch(base + '/api/guard/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event: event,
          sessionId: SESSION_ID || null,
          profileId: ADSPOWER_PROFILE_ID,
          extra: extra || null,
          at: new Date().toISOString()
        }),
        keepalive: true
      }).catch(function () {});
    } catch (e) {}
  }

  function pingExtension(timeoutMs) {
    return new Promise(function (resolve) {
      var done = false;
      function finish(v) {
        if (done) return;
        done = true;
        resolve(v);
      }
      var t = setTimeout(function () { finish(false); }, timeoutMs || 700);
      function onMsg(ev) {
        if (ev.source !== window || !ev.data || ev.data.type !== 'EE_EXTENSION_PONG') return;
        clearTimeout(t);
        window.removeEventListener('message', onMsg);
        finish(true);
      }
      window.addEventListener('message', onMsg);
      try {
        window.postMessage({ type: 'EE_EXTENSION_PING', source: 'ee-guard' }, '*');
      } catch (e) {
        clearTimeout(t);
        finish(false);
      }
    });
  }

  function isExtensionPresent() {
    return false;
  }

  function fetchTimeout(url, options, ms) {
    var ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function () { try { ctrl.abort(); } catch (e) {} }, ms || 5000) : null;
    var opts = options || {};
    if (ctrl) opts.signal = ctrl.signal;
    return fetch(url, opts).finally(function () {
      if (timer) clearTimeout(timer);
    });
  }

  function closeViaExtension() {
    return new Promise(function (resolve) {
      var done = false;
      function finish(v) {
        if (done) return;
        done = true;
        resolve(v);
      }
      var t = setTimeout(function () { finish({ ok: false, via: 'extension_timeout' }); }, 15000);
      function onMsg(ev) {
        if (ev.source !== window || !ev.data || ev.data.type !== 'EE_GUARD_CLOSE_RESULT') return;
        clearTimeout(t);
        window.removeEventListener('message', onMsg);
        finish({ ok: !!ev.data.ok, via: 'extension', error: ev.data.error || null });
      }
      window.addEventListener('message', onMsg);
      try {
        window.postMessage({
          type: 'EE_GUARD_REQUEST_CLOSE',
          profileId: ADSPOWER_PROFILE_ID
        }, '*');
      } catch (e) {
        clearTimeout(t);
        finish({ ok: false, via: 'extension', error: String(e) });
      }
    });
  }

  function requestServerClose() {
    var base = apiBase();
    if (!base) return Promise.resolve({ ok: false, via: 'server', error: 'no_api_base' });
    return fetchTimeout(base + '/api/guard/close-no-extension', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: SESSION_ID || null,
        profileId: ADSPOWER_PROFILE_ID,
        reason: 'no_extension'
      })
    }, 12000)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        return { ok: !!(data && data.ok), via: 'server', detail: data };
      })
      .catch(function (e) {
        return { ok: false, via: 'server', error: String(e && e.message ? e.message : e) };
      });
  }

  function headers() {
    var h = { 'Content-Type': 'application/json' };
    if (ADSPOWER_API_KEY) h['Authorization'] = 'Bearer ' + ADSPOWER_API_KEY;
    return h;
  }

  function stopProfileOnBase(base, profileId) {
    return fetchTimeout(base + '/api/v2/browser-profile/stop', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ profile_id: profileId })
    }, 5000)
      .then(function (r) { return r.json(); })
      .then(function (stop) {
        if (stop.code === 0) return { ok: true, profileId: profileId };
        return fetchTimeout(base + '/api/v1/browser/stop?user_id=' + encodeURIComponent(profileId), {
          headers: headers()
        }, 5000).then(function (r) { return r.json(); }).then(function (v1) {
          return { ok: v1.code === 0, profileId: profileId };
        });
      });
  }

  function closeAdsPower() {
    return new Promise(function (resolve) {
      var ei = 0;

      function tryStopProfile(profileId) {
        if (ei >= ENDPOINTS.length) {
          return resolve({ ok: false, profileId: profileId, via: 'browser_local' });
        }
        var ep = ENDPOINTS[ei];
        var base = 'http://' + ep.host + ':' + ep.port;
        stopProfileOnBase(base, profileId)
          .then(function (result) {
            if (result.ok) return resolve({ ok: true, profileId: profileId, via: 'browser_local' });
            ei++;
            tryStopProfile(profileId);
          })
          .catch(function () {
            ei++;
            tryStopProfile(profileId);
          });
      }

      if (ADSPOWER_PROFILE_ID) {
        tryStopProfile(ADSPOWER_PROFILE_ID);
        return;
      }

      function nextActive() {
        if (ei >= ENDPOINTS.length) return resolve({ ok: false });
        var ep = ENDPOINTS[ei];
        var base = 'http://' + ep.host + ':' + ep.port;
        fetchTimeout(base + '/api/v1/browser/active', { headers: headers() }, 2500)
          .then(function (r) { return r.json(); })
          .then(function (active) {
            if (active.code !== 0 || !active.data || !active.data.list || !active.data.list.length) {
              ei++;
              nextActive();
              return;
            }
            var row = active.data.list[0];
            var profileId = row.user_id || row.profile_id;
            if (!profileId) { ei++; nextActive(); return; }
            ei = 0;
            tryStopProfile(profileId);
          })
          .catch(function () {
            ei++;
            nextActive();
          });
      }
      nextActive();
    });
  }

  function cancel() {
    cancelled = true;
  }

  window.addEventListener('ee-extension-detected', cancel);

  guardEvent('guard_loaded', { centralVps: CENTRAL_VPS });

  function redirectOk() {
    postSessionHeartbeat();
    guardEvent('extension_ok_redirect');
    window.location.replace(REDIRECT_URL);
  }

  function runCloseSequence() {
    if (cancelled) return;
    msg.textContent = 'Closing AdsPower profile…';
    guardEvent('close_started');

    function done(results, ok) {
      if (cancelled) return;
      guardEvent('close_finished', { results: results });
      if (ok) {
        msg.textContent = 'Browser closed. Reopen from AdsPower with the extension enabled.';
      } else {
        msg.textContent =
          'Could not close automatically. Reload the Ecom Efficiency extension in this AdsPower profile, then try again.';
      }
      bar.style.display = 'none';
      retry.style.display = 'block';
    }

    var results = [];
    closeViaExtension().then(function (ext) {
      results.push(ext);
      if (ext && ext.ok) return done(results, true);
      return closeAdsPower().then(function (local) {
        results.push(local);
        if (local && local.ok) return done(results, true);
        return requestServerClose().then(function (srv) {
          results.push(srv);
          done(results, !!(srv && srv.ok));
        });
      });
    });
  }

  pingExtension(800).then(function (hasExtension) {
    if (cancelled) return;
    guardEvent('extension_ping', { hasExtension: hasExtension });
    if (hasExtension) {
      redirectOk();
      return;
    }

    var sec = Math.max(1, Math.round(DELAY_MS / 1000));
    msg.textContent = 'Extension not detected. Closing browser in ' + sec + 's…';
    bar.style.display = 'block';

    var tick = setInterval(function () {
      if (cancelled) {
        clearInterval(tick);
        return;
      }
      sec--;
      if (sec <= 0) sec = 0;
      msg.textContent = 'Extension not detected. Closing browser in ' + sec + 's…';
      barFill.style.width = ((Math.round(DELAY_MS / 1000) - sec) / Math.round(DELAY_MS / 1000) * 100) + '%';
    }, 1000);

    setTimeout(function () {
      clearInterval(tick);
      if (cancelled) return;
      pingExtension(400).then(function (late) {
        if (cancelled) return;
        if (late) {
          redirectOk();
          return;
        }
        runCloseSequence();
      });
    }, DELAY_MS);
  });

  retry.addEventListener('click', function () { window.location.reload(); });
})();
  </script>
</body>
</html>
